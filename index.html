<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers by T</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

   <div id="welcome-screen" class="screen">
    <div style="font-size: 60px;">🌷</div>
    <h1>FLOWERS BY T</h1>
    <button class="btn" onclick="showShop()">Смотреть каталог</button>
</div>

<div id="shop-screen" class="shop-screen">
    <h1 style="margin-top: 20px;">КАТАЛОГ</h1>
    
    <div class="shop-grid">
        
        <div class="card">
            <div class="icon">🌸</div> <p class="product-name">Букет "Весна"</p>
            <p class="price">850 грн</p>
            <button class="btn" onclick="order('Spring Bouquet', 850)">Заказать</button>
        </div>

        <div class="card">
            <div class="icon">🌹</div> <p class="product-name">Розы Микс</p>
            <p class="price">1200 грн</p>
            <button class="btn" onclick="order('Rose Mix', 1200)">Заказать</button>
        </div>

        <div class="card">
            <div class="icon">🌷</div> <p class="product-name">Тюльпаны</p>
            <p class="price">650 грн</p>
            <button class="btn" onclick="order('Tulips', 650)">Заказать</button>
        </div>

        <div class="card">
            <div class="icon">🌻</div> <p class="product-name">Подсолнухи</p>
            <p class="price">900 грн</p>
            <button class="btn" onclick="order('Sunflowers', 900)">Заказать</button>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
