<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers by T</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="welcome-screen" class="screen">
    <div style="font-size: 60px;">🌷</div>
    <h1>FLOWERS BY T</h1>
    <button class="btn" onclick="showCategories()">Смотреть каталог</button>
</div>

    <div id="categories-screen" class="screen">
        <h1>КАТЕГОРИИ</h1>
        <div class="shop-grid">
            <div class="card" onclick="showCategory('bouquets')">
                <div class="icon">💐</div>
                <p class="product-name">Букеты</p>
                <button class="btn">Открыть</button>
            </div>
            <div class="card" onclick="showCategory('dacha')">
                <div class="icon">🏡</div>
                <p class="product-name">Для дачи</p>
                <button class="btn">Открыть</button>
            </div>
            <div class="card" onclick="showCategory('seeds')">
                <div class="icon">🌱</div>
                <p class="product-name">Семена</p>
                <button class="btn">Открыть</button>
            </div>
            <div class="card" onclick="showCategory('fertilizers')">
                <div class="icon">🧪</div>
                <p class="product-name">Удобрения</p>
                <button class="btn">Открыть</button>
            </div>
            <div class="card" onclick="showCategory('care')">
                <div class="icon">🧹</div>
                <p class="product-name">Инструменты</p>
                <button class="btn">Открыть</button>
            </div>
            <div class="card" onclick="showCategory('pots')">
                <div class="icon">🪴</div>
                <p class="product-name">Комнатные</p>
                <button class="btn">Открыть</button>
            </div>
        </div>
    </div>

<div id="shop-screen" class="shop-screen" style="display: none;">
    <h1 id="category-title" style="margin-top: 20px;">КАТАЛОГ</h1>
    <div id="products-grid" class="shop-grid">
        </div>
    <button class="btn" style="background: #333; width: 80%; margin-bottom: 20px;" onclick="goBack()">⬅️ Назад</button>
</div>
    <script src="script.js"></script>

    <div id="product-detail-screen" class="screen" style="display: none;">
        <div id="detail-image-container"></div>
        <h2 id="detail-name"></h2>
        <p id="detail-description" style="padding: 0 20px; color: #aaa;"></p>
        <h3 id="detail-price" style="font-size: 24px;"></h3>
        
        <button class="btn" id="detail-order-btn" style="width: 80%; margin-top: 20px;">Заказать</button>
        <button class="btn" style="background: #333; width: 80%; margin-top: 15px;" onclick="closeDetail()">⬅️ Назад в каталог</button>
    </div>
    
</body>
</html>
