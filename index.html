<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers by T</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="welcome-screen">
        <div class="logo">🌷</div>
        <h1>Flowers by T</h1>
        <p>Премиальные букеты в Днепре.<br>Авторский стиль и свежесть 24/7.</p>
        <button class="btn" onclick="showShop()">Смотреть каталог</button>
    </div>

    <div id="shop-screen" style="display: none;">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=500" alt="Bouquet">
            <h3>Нежный букет</h3>
            <p class="price">850 грн</p>
            <button class="btn" onclick="order('Spring Bouquet')">Заказать</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1561181286-d39736abc71e?w=500" alt="Roses">
            <h3>Черные Розы</h3>
            <p class="price">1500 грн</p>
            <button class="btn" onclick="order('Dark Roses')">Заказать</button>
        </div>
    </div>

    <script>
        async function order(item) {
    tg.showConfirm(`Подтвердить заказ: ${item}?`, async (confirmed) => {
        if (!confirmed) return; // Если нажал Cancel — ничего не делаем

        const webhookUrl = 'https://tiktiok.xyz/webhook-test/e9d8d207-1c6b-44c2-a053-c41479cb32e6';

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    product: item,
                    username: tg.initDataUnsafe.user?.username || "anonymous",
                    first_name: tg.initDataUnsafe.user?.first_name || "User",
                    date: new Date().toLocaleString()
                })
            });

            if (response.ok) {
                tg.sendData(item);
                tg.close();
            } else {
                alert("Ошибка сервера n8n.");
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert("Не удалось связаться с сервером.");
            tg.close();
        }
    });
}
    </script>
</body>
</html>
