<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers by T</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="welcome-screen">
        <div class="logo">🌷</div>
        <h1>Flowers by T</h1>
        <p>Премиальные букеты в Днепре.<br>Авторский стиль и свежесть 24/7.</p>
        <button class="btn" onclick="showShop()">Смотреть каталог</button>
    </div>

    <div id="shop-screen" style="display: none;">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=500" alt="Bouquet">
            <h3>Нежный букет</h3>
            <p class="price">850 грн</p>
            <button class="btn" onclick="order('Spring Bouquet')">Заказать</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1561181286-d39736abc71e?w=500" alt="Roses">
            <h3>Черные Розы</h3>
            <p class="price">1500 грн</p>
            <button class="btn" onclick="order('Dark Roses')">Заказать</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция перехода от приветствия к магазину
        function showShop() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('shop-screen').style.display = 'block';
        }

        // Функция заказа (теперь с отправкой в n8n)
        function order(item) {
            tg.showConfirm(`Подтвердить заказ: ${item}?`, (confirmed) => {
                if (confirmed) {
                    // 1. Отправляем данные в самого бота (появится в чате)
                    tg.sendData(item); 
                    
                    // 2. Отправляем данные в твой n8n (твой жесткий Аудитор)
                    // ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЙ WEBHOOK URL ИЗ N8N
                    const webhookUrl = 'ТВОЙ_WEBHOOK_URL_ИЗ_N8N';

                    fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product: item,
                            username: tg.initDataUnsafe.user?.username || "anonymous",
                            first_name: tg.initDataUnsafe.user?.first_name || "User",
                            date: new Date().toLocaleString()
                        })
                    })
                    .then(response => {
                        console.log('Заказ улетел в n8n!');
                        tg.close(); // Закрываем мини-апку после успеха
                    })
                    .catch(error => {
                        console.error('Ошибка n8n:', error);
                        tg.close();
                    });
                }
            });
        }
    </script>
</body>
</html>
